<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalls - 4x4 Catalunya</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .premium-wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 50px;
      align-items: center;
      margin-top: 20px;
    }
    .premium-image { position: relative; }
    .premium-image img {
      width: 100%;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .premium-image::after {
      content: '';
      position: absolute;
      top: 10%; left: 10%; right: 10%; bottom: 10%;
      background: var(--orange);
      filter: blur(80px);
      opacity: 0.15;
      z-index: -1;
    }
    .premium-title {
      font-size: clamp(2.5rem, 5vw, 4rem);
      line-height: 1.1;
      margin-bottom: 30px;
      text-transform: uppercase;
      letter-spacing: -1px;
    }
    .info-boxes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
      margin-bottom: 40px;
    }
    .info-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      transition: border-color 0.3s;
    }
    .info-box:hover { border-color: var(--orange); }
    .info-box .icon { font-size: 1.8rem; display: block; margin-bottom: 5px; }
    .info-box .label { display: block; font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .info-box .value { display: block; font-size: 1.1rem; font-weight: 600; color: #fff; margin-top: 5px; }
    .btn-premium { font-size: 1.2rem; padding: 15px 40px; box-shadow: 0 10px 20px rgba(232,101,10,0.2); }
    @media (max-width: 900px) {
      .premium-wrapper { grid-template-columns: 1fr; gap: 30px; }
      .premium-title { text-align: center; margin-bottom: 20px; }
      .info-boxes { grid-template-columns: 1fr; }
      .info-box { display: flex; align-items: center; justify-content: flex-start; text-align: left; gap: 15px; padding: 15px 20px; }
      .info-box .icon { margin-bottom: 0; font-size: 2rem; }
      .detail-actions { text-align: center; }
      .btn-premium { width: 100%; }
    }
  </style>
</head>
<body>
  <header class="site-header scrolled">
    <div class="header-inner">
      <a href="index.html" class="logo" style="text-decoration:none;">
        <img src="assets/img/logo-4x4-catalunya-400.png" alt="Logo 4x4 Catalunya" class="logo-img" width="44" height="44" />
        <span class="logo-text">4<span class="logo-x">x</span>4 <strong>Catalunya</strong></span>
      </a>

      <div class="lang-switcher" role="group" aria-label="Seleccionar idioma">
        <button class="lang-btn" data-lang="ca" data-label="Català" title="Català">
          <svg viewBox="0 0 36 26" xmlns="http://www.w3.org/2000/svg">
            <rect width="36" height="26" fill="#FCDD09"/>
            <rect y="0" width="36" height="3.71" fill="#DA121A"/>
            <rect y="7.43" width="36" height="3.71" fill="#DA121A"/>
            <rect y="14.86" width="36" height="3.71" fill="#DA121A"/>
            <rect y="22.29" width="36" height="3.71" fill="#DA121A"/>
          </svg>
        </button>
        <button class="lang-btn" data-lang="es" data-label="Español" title="Español">
          <svg viewBox="0 0 36 26" xmlns="http://www.w3.org/2000/svg">
            <rect width="36" height="26" fill="#c60b1e"/>
            <rect y="6.5" width="36" height="13" fill="#ffc400"/>
          </svg>
        </button>
        <button class="lang-btn" data-lang="en" data-label="English" title="English">
          <svg viewBox="0 0 36 26" xmlns="http://www.w3.org/2000/svg">
            <rect width="36" height="26" fill="#012169"/>
            <path d="M0,0 L36,26 M36,0 L0,26" stroke="#fff" stroke-width="5.2"/>
            <path d="M0,0 L36,26 M36,0 L0,26" stroke="#C8102E" stroke-width="3.2"/>
            <path d="M18,0 V26 M0,13 H36" stroke="#fff" stroke-width="8.7"/>
            <path d="M18,0 V26 M0,13 H36" stroke="#C8102E" stroke-width="5.2"/>
          </svg>
        </button>
        <button class="lang-btn" data-lang="fr" data-label="Français" title="Français">
          <svg viewBox="0 0 36 26" xmlns="http://www.w3.org/2000/svg">
            <rect width="36" height="26" fill="#ED2939"/>
            <rect width="24" height="26" fill="#fff"/>
            <rect width="12" height="26" fill="#002395"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="container" style="margin-top: 120px; padding-bottom: 80px;">
    <div id="event-detail-content">
      <p style="color: white; text-align: center;" data-i18n="loadingEvent">Carregant esdeveniment...</p>
    </div>
    
    <div style="margin-top: 50px; text-align: center; border-top: 1px solid var(--border); padding-top: 30px;">
      <a href="index.html" class="btn btn-back" data-i18n="backBtn">← Tornar a la cartellera</a>
    </div>
  </main>

  <script type="module" src="assets/js/event-detail.js"></script>
</body>
</html>
